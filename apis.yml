aid: elation
name: Elation Health
description: >-
  Elation Health provides a primary care EHR platform with a REST API for
  managing patient profiles, clinical encounters, orders, results, prescriptions,
  and direct secure messaging in ambulatory settings. The API enables
  interoperability by integrating patient data from third-party sources,
  supporting patient engagement, clinical operations, scheduling, pharmacy
  management, and practice administration through OAuth2-secured REST endpoints.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
