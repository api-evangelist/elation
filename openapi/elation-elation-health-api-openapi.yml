components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://sandbox.elationemr.com/api/2.0/oauth2/token/
          scopes:
            apiv2: Full API access
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Unique resource identifier
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 25
      description: Number of results to return
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
      description: Pagination offset
  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: Bearer token for API requests
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token validity in seconds
          example: 36000
        refresh_token:
          type: string
          description: Token for obtaining new access tokens
        scope:
          type: string
          description: Granted permission scopes
    Error:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error description
        error:
          type: string
          description: Machine-readable error code
    PaginationMeta:
      type: object
      properties:
        count:
          type: integer
          description: Total number of results
        next:
          type: string
          nullable: true
          description: URL for next page
        previous:
          type: string
          nullable: true
          description: URL for previous page
    Address:
      type: object
      properties:
        address_line1:
          type: string
          description: Primary street address
        address_line2:
          type: string
          description: Secondary address line
        city:
          type: string
        state:
          type: string
          description: Two-letter state code
        zip:
          type: string
          description: ZIP or postal code
    Phone:
      type: object
      properties:
        phone:
          type: string
          description: Phone number
        phone_type:
          type: string
          enum:
            - Home
            - Work
            - Cell
            - Fax
    Email:
      type: object
      properties:
        email:
          type: string
          format: email
    PatientStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - Active
            - Inactive
            - Prospect
            - Deceased
        reason:
          type: string
          description: Reason for status
        deleted_date:
          type: string
          format: date-time
          readOnly: true
    PatientCreate:
      type: object
      required:
        - first_name
        - last_name
        - dob
        - primary_physician
        - caregiver_practice
        - sex
      properties:
        first_name:
          type: string
          maxLength: 70
          description: Patient's first name
        middle_name:
          type: string
          maxLength: 50
          description: Patient's middle name
        last_name:
          type: string
          maxLength: 70
          description: Patient's last name
        suffix:
          type: string
          maxLength: 20
          description: Name suffix
        actual_name:
          type: string
          maxLength: 150
          description: Preferred name variation
        dob:
          type: string
          format: date
          description: Date of birth (YYYY-MM-DD)
        sex:
          type: string
          enum:
            - Female
            - Male
            - Other
            - Unknown
          description: Biological sex
        gender_identity:
          type: string
          enum:
            - man
            - woman
            - nonbinary
            - transgender_man
            - transgender_woman
            - prefer_not_to_say
          description: Personal gender identity
        legal_gender_marker:
          type: string
          enum:
            - M
            - F
            - X
            - U
          description: Document gender marker
        pronouns:
          type: string
          enum:
            - he_him_his
            - she_her_hers
            - they_them_theirs
            - not_listed
          description: Preferred pronouns
        sexual_orientation:
          type: string
          enum:
            - straight
            - gay
            - lesbian
            - bisexual
            - queer
            - asexual
            - unknown
        race:
          type: string
          description: Racial category
        ethnicity:
          type: string
          description: Hispanic/Latino status
        preferred_language:
          type: string
          description: Patient's preferred communication language
        preferred_contact:
          type: string
          enum:
            - sms
            - email
            - phone
            - passport
        ssn:
          type: string
          maxLength: 37
          description: Social Security Number
        primary_physician:
          type: integer
          description: ID of physician providing care within practice
        caregiver_practice:
          type: integer
          description: Practice ID
        address:
          $ref: '#/components/schemas/Address'
        phones:
          type: array
          maxItems: 2
          items:
            $ref: '#/components/schemas/Phone'
        emails:
          type: array
          items:
            $ref: '#/components/schemas/Email'
        notes:
          type: string
          maxLength: 500
          description: Additional notes about patient
        vip:
          type: boolean
          description: VIP status flag
        tags:
          type: array
          maxItems: 10
          items:
            type: string
        patient_status:
          $ref: '#/components/schemas/PatientStatus'
        metadata:
          type: object
          description: Custom metadata
    PatientPatch:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 70
        middle_name:
          type: string
          maxLength: 50
        last_name:
          type: string
          maxLength: 70
        dob:
          type: string
          format: date
        sex:
          type: string
          enum:
            - Female
            - Male
            - Other
            - Unknown
        primary_physician:
          type: integer
        address:
          $ref: '#/components/schemas/Address'
        phones:
          type: array
          items:
            $ref: '#/components/schemas/Phone'
        emails:
          type: array
          items:
            $ref: '#/components/schemas/Email'
        patient_status:
          $ref: '#/components/schemas/PatientStatus'
        metadata:
          type: object
    Patient:
      allOf:
        - $ref: '#/components/schemas/PatientCreate'
        - type: object
          properties:
            id:
              type: integer
              format: int64
              readOnly: true
              description: Unique patient identifier
            created_date:
              type: string
              format: date-time
              readOnly: true
            deleted_date:
              type: string
              format: date-time
              nullable: true
              readOnly: true
            merged_into_chart:
              type: integer
              format: int64
              nullable: true
              readOnly: true
            sms_opt_in_status:
              type: boolean
              readOnly: true
            verified:
              type: boolean
            primary_care_provider:
              type: integer
              readOnly: true
            primary_care_provider_npi:
              type: string
              maxLength: 10
            consents:
              type: array
              readOnly: true
              items:
                type: object
    PaginatedPatientList:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/Patient'
    AppointmentStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - Scheduled
            - Confirmed
            - Checked Out
            - Cancelled
            - With Doctor
            - In Room
            - Checked In
            - In Room - Vitals Taken
            - Not Seen
            - Billed
        room:
          type: string
          description: Physical room assignment
        status_date:
          type: string
          format: date-time
          readOnly: true
        status_detail:
          type: string
          enum:
            - No Show
            - Left Without Seeing
            - Other
          description: Additional detail when status is Not Seen
    AppointmentCreate:
      type: object
      required:
        - scheduled_date
        - duration
        - reason
        - patient
        - physician
        - practice
        - service_location
      properties:
        scheduled_date:
          type: string
          format: date-time
          description: Appointment date and time (ISO 8601)
        duration:
          type: integer
          minimum: 1
          maximum: 1440
          description: Duration in minutes (5-minute increments)
        reason:
          type: string
          maxLength: 50
          description: Appointment reason/type
        description:
          type: string
          maxLength: 500
          description: Additional context
        patient:
          type: integer
          format: int64
          description: Patient ID
        physician:
          type: integer
          format: int64
          description: Physician ID
        practice:
          type: integer
          format: int64
          description: Practice ID
        service_location:
          type: object
          description: Facility where appointment occurs
        mode:
          type: string
          enum:
            - IN_PERSON
            - VIDEO
          description: Visit format
        instructions:
          type: string
          maxLength: 500
          description: Appointment instructions
        metadata:
          type: object
          nullable: true
    AppointmentPatch:
      type: object
      properties:
        scheduled_date:
          type: string
          format: date-time
        duration:
          type: integer
        reason:
          type: string
          maxLength: 50
        description:
          type: string
          maxLength: 500
        status:
          $ref: '#/components/schemas/AppointmentStatus'
        mode:
          type: string
          enum:
            - IN_PERSON
            - VIDEO
        instructions:
          type: string
          maxLength: 500
    Appointment:
      allOf:
        - $ref: '#/components/schemas/AppointmentCreate'
        - type: object
          properties:
            id:
              type: integer
              format: int64
              readOnly: true
            time_slot_type:
              type: string
              default: appointment
            time_slot_status:
              type: object
              nullable: true
            status:
              $ref: '#/components/schemas/AppointmentStatus'
            payment:
              type: object
              nullable: true
              properties:
                amount:
                  type: number
                collection_date:
                  type: string
                  format: date
            billing_details:
              type: object
              nullable: true
            is_blocking:
              type: boolean
              readOnly: true
            created_date:
              type: string
              format: date-time
              readOnly: true
            last_modified_date:
              type: string
              format: date-time
              readOnly: true
            deleted_date:
              type: string
              format: date-time
              nullable: true
              readOnly: true
    PaginatedAppointmentList:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/Appointment'
    VisitNoteCreate:
      type: object
      required:
        - patient
        - physician
        - practice
        - document_date
        - chart_date
        - template
      properties:
        patient:
          type: integer
          format: int64
          description: Patient ID
        physician:
          type: integer
          format: int64
          description: Clinician ID
        practice:
          type: integer
          format: int64
          description: Practice ID
        document_date:
          type: string
          format: date-time
          description: Clinical service date
        chart_date:
          type: string
          format: date-time
          description: Date entry was recorded in chart
        template:
          type: string
          enum:
            - Simple
            - SOAP
            - Complete H&P
            - Pre-Op
          description: Document structure format
        type:
          type: string
          maxLength: 50
          description: Visit note classification
        bullets:
          type: array
          description: Clinical bullet points organized by category
          items:
            type: object
            properties:
              category:
                type: string
              text:
                type: string
                maxLength: 500
        confidential:
          type: boolean
          description: Privacy flag for sensitive content
        tags:
          type: array
          items:
            type: string
    VisitNote:
      allOf:
        - $ref: '#/components/schemas/VisitNoteCreate'
        - type: object
          properties:
            id:
              type: integer
              format: int64
              readOnly: true
            checklists:
              type: object
              description: PE and ROS checklist items
            edits:
              type: array
              readOnly: true
              items:
                type: object
            signatures:
              type: array
              readOnly: true
              items:
                type: object
            signed_date:
              type: string
              format: date-time
              nullable: true
            signed_by:
              type: integer
              nullable: true
            amendment_request:
              type: object
              nullable: true
            created_date:
              type: string
              format: date-time
              readOnly: true
            last_modified:
              type: string
              format: date-time
              readOnly: true
            deleted_date:
              type: string
              format: date-time
              nullable: true
              readOnly: true
            clinical_summary_link:
              type: string
              format: uri
              readOnly: true
            visit_summary_link:
              type: string
              format: uri
              readOnly: true
    PaginatedVisitNoteList:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/VisitNote'
    Diagnosis:
      type: object
      properties:
        icd9:
          type: array
          items:
            type: string
        icd10:
          type: array
          items:
            type: string
        snomed:
          type: string
    ProblemCreate:
