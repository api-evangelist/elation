openapi: 3.0.3
info:
  title: Elation Health REST API
  description: >-
    RESTful API for Elation's primary care EHR platform enabling management of
    patient profiles, visit notes, clinical documents, problems, allergies,
    immunizations, vitals, medications, lab orders, imaging orders, referrals,
    appointments, insurance, billing, pharmacy, messaging, and practice
    administration. Supports OAuth2 client credentials authentication with
    both sandbox and production environments.
  version: '2.0'
  contact:
    name: Elation Health Developer Support
    url: https://docs.elationhealth.com/reference/api-overview
  termsOfService: https://www.elationhealth.com/
servers:
  - url: https://app.elationemr.com/api/2.0
    description: Production
  - url: https://sandbox.elationemr.com/api/2.0
    description: Sandbox
security:
  - oauth2: []
tags:
  - name: Patients
    description: Patient profile management
  - name: Appointments
    description: Scheduling and appointment management
  - name: Visit Notes
    description: Clinical encounter documentation
  - name: Problems
    description: Patient problem list management
  - name: Allergies
    description: Allergy and drug intolerance tracking
  - name: Medications
    description: Medication and prescription management
  - name: Lab Orders
    description: Laboratory order management
  - name: Imaging Orders
    description: Radiology and imaging order management
  - name: Referrals
    description: Referral order management
  - name: Messaging
    description: Secure direct messaging
  - name: Billing
    description: Billing codes and bill management
  - name: Insurance
    description: Insurance company, plan, and policy management
  - name: Physicians
    description: Provider and staff management
  - name: Practices
    description: Practice administration
  - name: Authentication
    description: OAuth2 token management
paths:
  /oauth2/token/:
    post:
      operationId: getToken
      summary: Obtain OAuth2 access token
      description: >-
        Exchange client credentials for an OAuth2 access token using the
        client_credentials grant type.
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - client_id
                - client_secret
              properties:
                grant_type:
                  type: string
                  enum:
                    - client_credentials
                  description: OAuth2 grant type
                client_id:
                  type: string
                  description: Your client identifier
                client_secret:
                  type: string
                  description: Your client secret
                scope:
                  type: string
                  description: Space-separated list of requested scopes; defaults to apiv2
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /patients/:
    get:
      operationId: patients_list
      summary: List patients
      description: Retrieve a paginated list of patients in the practice.
      tags:
        - Patients
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: first_name
          in: query
          schema:
            type: string
          description: Filter by first name
        - name: last_name
          in: query
          schema:
            type: string
          description: Filter by last name
        - name: dob
          in: query
          schema:
            type: string
            format: date
          description: Filter by date of birth (YYYY-MM-DD)
      responses:
        '200':
          description: Paginated list of patients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPatientList'
    post:
      operationId: patients_create
      summary: Create a patient
      description: Create a new patient record in the practice.
      tags:
        - Patients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
