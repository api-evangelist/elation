            - Active
            - Controlled
            - Resolved
        synopsis:
          type: string
          description: Brief synopsis of the problem
        start_date:
          type: string
          format: date-time
          description: Date the problem started
        resolved_date:
          type: string
          format: date-time
          nullable: true
          description: Date the problem was resolved (required when status is Resolved)
        patient:
          type: integer
          description: Patient ID
        dx:
          $ref: '#/components/schemas/Diagnosis'
    Problem:
      allOf:
        - $ref: '#/components/schemas/ProblemCreate'
        - type: object
          properties:
            id:
              type: integer
              readOnly: true
            created_date:
              type: string
              format: date-time
              readOnly: true
            deleted_date:
              type: string
              format: date-time
              nullable: true
